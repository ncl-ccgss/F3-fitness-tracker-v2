<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中三級專屬：我的健身升級之路 🚀 (智能版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --chat-bg: #e1f5fe;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { text-align: center; color: var(--text-color); }
        h1 { border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; }
        .section {
            margin-bottom: 30px;
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex: 1;
            min-width: 120px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-workout { background-color: var(--primary-color); }
        .btn-workout:hover { background-color: #45a049; }
        .btn-body { background-color: var(--secondary-color); }
        .btn-body:hover { background-color: #1976d2; }
        .btn-score { background-color: #FF9800; width: 100%; font-size: 1.2em; margin-top: 10px;}
        .btn-score:hover { background-color: #e68a00; }
        .btn-clear { background-color: #dc3545; width: 100%; margin-top: 15px; }
        .btn-clear:hover { background-color: #c82333; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .score-display {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin-top: 20px;
        }
        .goal-indicator {
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 10px;
            color: #FF5722;
        }
        /* 聊天機械人樣式 */
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }
        #chat-header {
            background-color: var(--secondary-color);
            color: white;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        #chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .bot-message {
            background-color: white;
            align-self: flex-start;
        }
        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
        }
        #chat-input-container {
            display: flex;
            padding: 10px;
            background: white;
        }
        #chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #send-chat {
            background-color: var(--secondary-color);
            margin-left: 5px;
            padding: 8px 12px;
        }
        #chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--secondary-color);
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            z-index: 1001;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 中三級：我的健身升級之路 (智能版)</h1>
    <p style="text-align: center;">堅持紀錄，設定目標，即時解惑，見證變強！💪 (資料自動儲存)</p>

    <div class="section">
        <h2>🎯設定我的進度目標</h2>
        <p style="text-align: center;">設定一個月內希望達到的數據</p>
        <div class="form-group">
            <input type="date" id="g-date" required>
            <input type="number" id="g-chest" placeholder="目標胸圍 (cm)" min="1">
            <input type="number" id="g-arm" placeholder="目標手臂圍 (cm)" min="1">
            <input type="number" id="g-waist" placeholder="目標腰圍 (cm)" min="1">
            <input type="number" id="g-workout" placeholder="目標月訓練 (次)" min="1">
            <button class="btn-score" onclick="setGoals()">儲存目標</button>
        </div>
        <div id="goal-summary" class="goal-indicator"></div>
    </div>

    <div class="section" id="workout-section">
        <h2>🏋️‍♂️ 訓練過程紀錄</h2>
        <div class="form-group">
            <input type="date" id="w-date" required>
            <select id="w-exercise">
                <option value="掌上壓">掌上壓</option>
                <option value="深蹲">深蹲</option>
                <option value="引體上升">引體上升</option>
                <option value="啞鈴彎舉">啞鈴彎舉</option>
                <option value="平板支撐">平板支撐</option>
            </select>
            <input type="number" id="w-weight" placeholder="重量 (kg)" min="0">
            <input type="number" id="w-reps" placeholder="次數/秒" min="1">
            <input type="number" id="w-sets" placeholder="組數" min="1">
            <button class="btn-workout" onclick="addWorkout()">新增訓練</button>
        </div>
        
        <div class="chart-container">
            <canvas id="workoutChart"></canvas>
        </div>

        <table>
            <thead><tr><th>日期</th><th>動作</th><th>重量(kg)</th><th>次數/秒</th><th>組數</th></tr></thead>
            <tbody id="workout-table-body"></tbody>
        </table>
    </div>

    <div class="section" id="body-section">
        <h2>📏 身型變化紀錄 (肌肉圍度)</h2>
        <div class="form-group">
            <input type="date" id="b-date" required>
            <input type="number" id="b-chest" placeholder="胸圍 (cm)" min="1">
            <input type="number" id="b-arm" placeholder="手臂圍 (cm)" min="1">
            <input type="number" id="b-waist" placeholder="腰圍 (cm)" min="1">
            <button class="btn-body" onclick="addBodyRecord()">新增圍度</button>
        </div>
        
        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>

        <table>
            <thead><tr><th>日期</th><th>胸圍 (cm)</th><th>手臂圍 (cm)</th><th>腰圍 (cm)</th></tr></thead>
            <tbody id="body-table-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>🏆 努力值評分系統</h2>
        <button class="btn-score" onclick="calculateScore()">結算我的綜合評分！</button>
        <div id="score-result" class="score-display"></div>
        
        <button class="btn-clear" onclick="clearData()">⚠️ 清除所有紀錄 (重新開始)</button>
    </div>
</div>

<div id="chat-toggle" onclick="toggleChat()">💬</div>
<div id="chat-widget">
    <div id="chat-header" onclick="toggleChat()">健身小教練</div>
    <div id="chat-messages">
        <div class="message bot-message">我是健身小教練，有什麼問題（如動作、營養、目標設定）可以問我喔！</div>
    </div>
    <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="在這裡輸入問題...">
        <button id="send-chat" onclick="sendMessage()">發送</button>
    </div>
</div>

<script>
    // 初始化數據
    let workouts = JSON.parse(localStorage.getItem('f3_v3_workouts')) || [];
    let bodyStats = JSON.parse(localStorage.getItem('f3_v3_bodyStats')) || [];
    let goals = JSON.parse(localStorage.getItem('f3_v3_goals')) || {};
    let growthChart, workoutChart;

    // 模擬的常見問題回答 (簡單機械人邏輯)
    const botResponses = {
        "掌上壓": "掌上壓能訓練胸肌和三頭肌。記得保持背部挺直，下降時吸氣，上升時呼氣。",
        "深蹲": "深蹲是訓練大腿和臀部的王者動作。注意膝蓋不要超過腳尖，核心收緊。",
        "目標": "設定具體、可量化的目標非常重要！建議設定每週至少3次訓練，每個月測量一次圍度。",
        "營養": "健身需要配合充足的蛋白質（如雞蛋、雞胸肉、魚）和碳水化合物（如飯、番薯），才能幫助肌肉成長。",
        "預期": "線圖中的紅色虛線是你的預期目標，你的實際數據需要高於（胸圍/手臂）或低於（腰圍）紅色線才算跟上喔！"
    };

    window.onload = function() {
        document.querySelectorAll('input[type="date"]').forEach(inp => inp.valueAsDate = new Date());
        renderTables();
        updateCharts();
        updateGoalSummary();
    };

    // 設置目標
    function setGoals() {
        goals = {
            date: document.getElementById('g-date').value,
            chest: document.getElementById('g-chest').value,
            arm: document.getElementById('g-arm').value,
            waist: document.getElementById('g-waist').value,
            workout: document.getElementById('g-workout').value
        };
        localStorage.setItem('f3_v3_goals', JSON.stringify(goals));
        updateGoalSummary();
        updateCharts(); // 目標改變需要更新圖表
        alert("目標設定成功！");
    }

    function updateGoalSummary() {
        const summary = document.getElementById('goal-summary');
        if (goals.date) {
            summary.innerText = `一個月目標 (${goals.date}): 胸圍 ${goals.chest || '?'}cm, 手臂 ${goals.arm || '?'}cm, 腰圍 ${goals.waist || '?'}cm, 訓練 ${goals.workout || '?'}次`;
        } else {
            summary.innerText = "尚未設定進度目標";
        }
    }

    // 訓練紀錄
    function addWorkout() {
        // (同前代碼，加上儲存LocalStorage)
        const workout = {
            date: document.getElementById('w-date').value,
            exercise: document.getElementById('w-exercise').value,
            weight: document.getElementById('w-weight').value || "0",
            reps: document.getElementById('w-reps').value,
            sets: document.getElementById('w-sets').value
        };
        if(!workout.date || !workout.reps || !workout.sets) return alert("請填寫日期、次數及組數！");
        workouts.push(workout);
        localStorage.setItem('f3_v3_workouts', JSON.stringify(workouts));
        renderTables();
        updateCharts();
    }

    // 身型紀錄
    function addBodyRecord() {
        const record = {
            date: document.getElementById('b-date').value,
            chest: document.getElementById('b-chest').value,
            arm: document.getElementById('b-arm').value,
            waist: document.getElementById('b-waist').value
        };
        if(!record.date || (!record.chest && !record.arm && !record.waist)) return alert("至少填寫一項圍度數據！");
        bodyStats.push(record);
        bodyStats.sort((a, b) => new Date(a.date) - new Date(b.date));
        localStorage.setItem('f3_v3_bodyStats', JSON.stringify(bodyStats));
        renderTables();
        updateCharts();
    }

    // 更新圖表
    function updateCharts() {
        const growthCtx = document.getElementById('growthChart').getContext('2d');
        const workoutCtx = document.getElementById('workoutChart').getContext('2d');
        const latestStat = bodyStats.length > 0 ? bodyStats[bodyStats.length - 1] : null;

        if (growthChart) growthChart.destroy();
        if (workoutChart) workoutChart.destroy();

        // 訓練線圖：展示每月訓練次數與目標對比
        const workoutDataByMonth = {};
        workouts.forEach(w => {
            const month = w.date.substring(0, 7);
            workoutDataByMonth[month] = (workoutDataByMonth[month] || 0) + 1;
        });
        const wLabels = Object.keys(workoutDataByMonth);
        const wData = Object.values(workoutDataByMonth);

        workoutChart = new Chart(workoutCtx, {
            type: 'line',
            data: {
                labels: wLabels,
                datasets: [
                    { label: '實際月訓練 (次)', data: wData, borderColor: var(--primary-color), backgroundColor: 'rgba(76, 175, 80, 0.2)', fill: true, tension: 0.1 },
                    // 目標對比：一條紅色虛線
                    { label: '目標月訓練 (次)', data: Array(wLabels.length).fill(goals.workout), borderColor: '#dc3545', borderDash: [5, 5], tension: 0.1, radius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '🏋️‍♂️ 每月訓練頻率對比' } } }
        });

        // 身型線圖：圍度成長與目標對比
        const bLabels = bodyStats.map(b => b.date);
        growthChart = new Chart(growthCtx, {
            type: 'line',
            data: {
                labels: bLabels,
                datasets: [
                    { label: '胸圍 (cm)', data: bodyStats.map(b => b.chest), borderColor: '#FF6384', tension: 0.1, spanGaps: true },
                    { label: '手臂圍 (cm)', data: bodyStats.map(b => b.arm), borderColor: '#36A2EB', tension: 0.1, spanGaps: true },
                    { label: '腰圍 (cm)', data: bodyStats.map(b => b.waist), borderColor: '#FFCE56', tension: 0.1, spanGaps: true },
                    // 身型目標：在圖表最右側顯示目标
                    { label: '目標胸圍', data: bLabels.map((_, i) => i === bLabels.length-1 ? goals.chest : null), borderColor: '#FF6384', borderDash: [5, 5], radius: 6, backgroundColor: '#FF6384' },
                    { label: '目標手臂', data: bLabels.map((_, i) => i === bLabels.length-1 ? goals.arm : null), borderColor: '#36A2EB', borderDash: [5, 5], radius: 6, backgroundColor: '#36A2EB' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '📈 肌肉圍度成長與目標' } } }
        });
    }

    // 模擬聊天機械人
    function toggleChat() {
        const widget = document.getElementById('chat-widget');
        widget.style.display = widget.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        addChatMessage(text, 'user-message');
        input.value = '';

        // 簡單邏輯：查找關鍵字
        let response = "不好意思，我不懂這個問題。可以試試問關於「動作」、「營養」、「目標」或「預期」喔！";
        for (const keyword in botResponses) {
            if (text.includes(keyword)) {
                response = botResponses[keyword];
                break;
            }
        }
        setTimeout(() => addChatMessage(response, 'bot-message'), 500); // 模擬延遲
    }

    function addChatMessage(text, className) {
        const messages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight; // 自動滑動到底部
    }

    // (renderTables, calculateScore, clearData 函數同前代碼)
    function renderTables() { /* 同前，略去以減少長度 */ }
    function calculateScore() { /* 同前 */ }
    function clearData() { /* 同前 */ }
</script>

</body>
</html>
