<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中三級專屬：我的健康升級之路 🚀</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --fatloss-color: #9C27B0;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --chat-bg: #e1f5fe;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2, h3 { text-align: center; color: var(--text-color); }
        h1 { border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; }
        .section { margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; min-width: 120px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-workout { background-color: var(--primary-color); }
        .btn-workout:hover { background-color: #45a049; }
        .btn-body { background-color: var(--secondary-color); }
        .btn-body:hover { background-color: #1976d2; }
        .btn-score { background-color: #FF9800; width: 100%; font-size: 1.2em; margin-top: 10px;}
        .btn-score:hover { background-color: #e68a00; }
        .btn-clear { background-color: #dc3545; width: 100%; margin-top: 15px; }
        .btn-clear:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .score-display { text-align: center; font-size: 1.5em; font-weight: bold; margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 20px; }
        .goal-indicator { text-align: center; font-size: 1.1em; font-weight: bold; margin-top: 10px; color: #FF5722; background: #fff3e0; padding: 10px; border-radius: 8px;}
        
        /* 聊天機械人 */
        #chat-widget { position: fixed; bottom: 80px; right: 20px; width: 300px; height: 400px; background: white; border: 1px solid #ccc; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; display: none; flex-direction: column; z-index: 1000; }
        #chat-header { background-color: var(--secondary-color); color: white; padding: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; background-color: var(--chat-bg); display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; word-wrap: break-word; }
        .bot-message { background-color: white; align-self: flex-start; }
        .user-message { background-color: var(--primary-color); color: white; align-self: flex-end; }
        #chat-input-container { display: flex; padding: 10px; background: white; border-top: 1px solid #eee; }
        #chat-input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        #send-chat { background-color: var(--secondary-color); margin-left: 5px; padding: 8px 12px; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #chat-toggle { position: fixed; bottom: 20px; right: 20px; background-color: var(--secondary-color); color: white; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.8em; z-index: 1001; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }
        #chat-toggle:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 中三級：我的健康與健身升級之路</h1>

    <div class="section">
        <h2>🎯 1. 選擇路線與設定目標</h2>
        <div class="form-group">
            <select id="g-mode" style="background-color: #e3f2fd; font-weight: bold;">
                <option value="💪 增肌變強">💪 我的目標：增肌變強</option>
                <option value="🔥 減脂瘦身">🔥 我的目標：減脂瘦身</option>
            </select>
            <input type="date" id="g-date" required>
        </div>
        <div class="form-group">
            <input type="number" id="g-weight" placeholder="目標體重 (kg)" step="0.1">
            <input type="number" id="g-waist" placeholder="目標腰圍 (cm)" min="1">
            <input type="number" id="g-chest" placeholder="目標胸圍 (cm)" min="1">
            <input type="number" id="g-workout" placeholder="目標月訓練 (次)" min="1">
            <button class="btn-score" onclick="setGoals()">儲存專屬目標</button>
        </div>
        <div id="goal-summary" class="goal-indicator"></div>
    </div>

    <div class="section" id="workout-section">
        <h2>🏃‍♂️ 2. 運動與訓練紀錄</h2>
        <div class="form-group">
            <input type="date" id="w-date" required>
            <select id="w-exercise">
                <optgroup label="力量訓練 (增肌)">
                    <option value="掌上壓">掌上壓</option>
                    <option value="深蹲">深蹲</option>
                    <option value="引體上升">引體上升</option>
                    <option value="啞鈴訓練">啞鈴訓練</option>
                </optgroup>
                <optgroup label="有氧運動 (減脂)">
                    <option value="跑步">跑步</option>
                    <option value="跳繩">跳繩</option>
                    <option value="踩單車">踩單車</option>
                    <option value="游泳">游泳</option>
                </optgroup>
            </select>
            <input type="number" id="w-weight" placeholder="重量(kg)/距離(km)" step="0.1" min="0">
            <input type="number" id="w-reps" placeholder="次數/分鐘" min="1">
            <button class="btn-workout" onclick="addWorkout()">新增運動紀錄</button>
        </div>
        <div class="chart-container"><canvas id="workoutChart"></canvas></div>
        <table>
            <thead><tr><th>日期</th><th>運動項目</th><th>重量/距離</th><th>次數/時間</th></tr></thead>
            <tbody id="workout-table-body"></tbody>
        </table>
    </div>

    <div class="section" id="body-section">
        <h2>📏 3. 身體數據追蹤 (體重與圍度)</h2>
        <div class="form-group">
            <input type="date" id="b-date" required>
            <input type="number" id="b-weight" placeholder="目前體重 (kg)" step="0.1">
            <input type="number" id="b-waist" placeholder="腰圍 (cm)" min="1">
            <input type="number" id="b-chest" placeholder="胸圍 (cm)" min="1">
            <button class="btn-body" onclick="addBodyRecord()">新增身體數據</button>
        </div>
        
        <div class="chart-container"><canvas id="weightChart"></canvas></div>
        <div class="chart-container"><canvas id="growthChart"></canvas></div>
        
        <table>
            <thead><tr><th>日期</th><th>體重 (kg)</th><th>腰圍 (cm)</th><th>胸圍 (cm)</th></tr></thead>
            <tbody id="body-table-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>🏆 努力值評分系統</h2>
        <button class="btn-score" onclick="calculateScore()">結算我的綜合評分！</button>
        <div id="score-result" class="score-display"></div>
        <button class="btn-clear" onclick="clearData()">⚠️ 清除所有紀錄</button>
    </div>
</div>

<div id="chat-toggle" onclick="toggleChat()">💬</div>
<div id="chat-widget">
    <div id="chat-header" onclick="toggleChat()">🤖 健康小教練 (點擊關閉)</div>
    <div id="chat-messages">
        <div class="message bot-message">嗨！我是你的專屬教練。你可以問我關於「增肌」、「減肥」、「有氧」、「掌上壓」或「飲食」的問題喔！</div>
    </div>
    <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="輸入問題..." onkeypress="handleKeyPress(event)">
        <button id="send-chat" onclick="sendMessage()">發送</button>
    </div>
</div>

<script>
    function safeLoad(key, defaultVal) {
        try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : defaultVal; } 
        catch(e) { return defaultVal; }
    }
    function safeSave(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
    }

    let workouts = safeLoad('f3_v6_workouts', []);
    let bodyStats = safeLoad('f3_v6_bodyStats', []);
    let goals = safeLoad('f3_v6_goals', {});
    let growthChart = null, workoutChart = null, weightChart = null;

    function setTodayDate(id) {
        try {
            const el = document.getElementById(id);
            const today = new Date();
            el.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        } catch(e) {}
    }

    window.onload = function() {
        setTodayDate('g-date'); setTodayDate('w-date'); setTodayDate('b-date');
        if(goals.date) {
            document.getElementById('g-mode').value = goals.mode || '💪 增肌變強';
            document.getElementById('g-weight').value = goals.weight || '';
            document.getElementById('g-waist').value = goals.waist || '';
            document.getElementById('g-chest').value = goals.chest || '';
            document.getElementById('g-workout').value = goals.workout || '';
        }
        try { renderTables(); updateGoalSummary(); updateCharts(); } catch(e){}
    };

    function setGoals() {
        goals = {
            mode: document.getElementById('g-mode').value,
            date: document.getElementById('g-date').value,
            weight: document.getElementById('g-weight').value,
            waist: document.getElementById('g-waist').value,
            chest: document.getElementById('g-chest').value,
            workout: document.getElementById('g-workout').value
        };
        safeSave('f3_v6_goals', goals);
        updateGoalSummary(); updateCharts();
        alert(`已設定為「${goals.mode}」路線！`);
    }

    function updateGoalSummary() {
        const summary = document.getElementById('goal-summary');
        if (goals.date) {
            summary.innerHTML = `路線：<b>${goals.mode || '未設定'}</b> <br> 目標 (${goals.date}): 體重 ${goals.weight || '?'}kg | 腰圍 ${goals.waist || '?'}cm | 胸圍 ${goals.chest || '?'}cm | 月運動 ${goals.workout || '?'}次`;
        } else {
            summary.innerText = "尚未設定進度目標";
        }
    }

    function addWorkout() {
        const workout = {
            date: document.getElementById('w-date').value,
            exercise: document.getElementById('w-exercise').value,
            weight: document.getElementById('w-weight').value || "-",
            reps: document.getElementById('w-reps').value
        };
        if(!workout.date || !workout.reps) return alert("請填寫日期和次數/時間！");
        workouts.push(workout);
        safeSave('f3_v6_workouts', workouts);
        document.getElementById('w-reps').value = '';
        renderTables(); updateCharts();
    }

    function addBodyRecord() {
        const record = {
            date: document.getElementById('b-date').value,
            weight: document.getElementById('b-weight').value,
            waist: document.getElementById('b-waist').value,
            chest: document.getElementById('b-chest').value
        };
        if(!record.date || (!record.weight && !record.waist && !record.chest)) return alert("請至少填寫一項身體數據！");
        bodyStats.push(record);
        bodyStats.sort((a, b) => new Date(a.date) - new Date(b.date));
        safeSave('f3_v6_bodyStats', bodyStats);
        document.getElementById('b-weight').value = '';
        renderTables(); updateCharts();
    }

    function renderTables() {
        const wTbody = document.getElementById('workout-table-body');
        wTbody.innerHTML = '';
        workouts.forEach(w => { wTbody.innerHTML += `<tr><td>${w.date}</td><td>${w.exercise}</td><td>${w.weight}</td><td>${w.reps}</td></tr>`; });

        const bTbody = document.getElementById('body-table-body');
        bTbody.innerHTML = '';
        bodyStats.forEach(b => { bTbody.innerHTML += `<tr><td>${b.date}</td><td>${b.weight || '-'}</td><td>${b.waist || '-'}</td><td>${b.chest || '-'}</td></tr>`; });
    }

    function updateCharts() {
        if(typeof Chart === 'undefined') return;
        
        const wCtx = document.getElementById('workoutChart').getContext('2d');
        const weightCtx = document.getElementById('weightChart').getContext('2d');
        const growthCtx = document.getElementById('growthChart').getContext('2d');
        
        if (workoutChart) workoutChart.destroy();
        if (weightChart) weightChart.destroy();
        if (growthChart) growthChart.destroy();

        // 1. 運動頻率圖表
        const workoutDataByMonth = {};
        workouts.forEach(w => { const m = w.date.substring(0, 7); workoutDataByMonth[m] = (workoutDataByMonth[m] || 0) + 1; });
        const wLabels = Object.keys(workoutDataByMonth).sort();
        
        workoutChart = new Chart(wCtx, {
            type: 'line',
            data: {
                labels: wLabels.length ? wLabels : ['無數據'],
                datasets: [
                    { label: '實際月運動 (次)', data: wLabels.map(l => workoutDataByMonth[l]), borderColor: '#4CAF50', backgroundColor: 'rgba(76, 175, 80, 0.2)', fill: true, tension: 0.1 },
                    { label: '目標', data: Array(wLabels.length || 1).fill(goals.workout || null), borderColor: '#dc3545', borderDash: [5, 5], radius: 0 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '🏃‍♂️ 每月運動頻率' } } }
        });

        // 準備身體數據
        const bLabels = bodyStats.map(b => b.date);

        // 2. 體重專屬圖表 (減脂重點)
        weightChart = new Chart(weightCtx, {
            type: 'line',
            data: {
                labels: bLabels.length ? bLabels : ['無數據'],
                datasets: [
                    { label: '實際體重 (kg)', data: bodyStats.map(b => b.weight), borderColor: '#9C27B0', backgroundColor: 'rgba(156, 39, 176, 0.1)', fill: true, tension: 0.1, spanGaps: true },
                    { label: '目標體重', data: bLabels.map((_, i) => i === bLabels.length-1 ? goals.weight : null), borderColor: '#FF9800', borderDash: [5, 5], radius: 6 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '⚖️ 體重變化趨勢 (減重/增重追蹤)' } } }
        });

        // 3. 圍度圖表
        growthChart = new Chart(growthCtx, {
            type: 'line',
            data: {
                labels: bLabels.length ? bLabels : ['無數據'],
                datasets: [
                    { label: '腰圍(cm)', data: bodyStats.map(b => b.waist), borderColor: '#FFCE56', tension: 0.1, spanGaps: true },
                    { label: '胸圍(cm)', data: bodyStats.map(b => b.chest), borderColor: '#FF6384', tension: 0.1, spanGaps: true },
                    { label: '目標腰圍', data: bLabels.map((_, i) => i === bLabels.length-1 ? goals.waist : null), borderColor: '#FFCE56', borderDash: [5, 5], radius: 6 },
                    { label: '目標胸圍', data: bLabels.map((_, i) => i === bLabels.length-1 ? goals.chest : null), borderColor: '#FF6384', borderDash: [5, 5], radius: 6 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '📏 身體圍度變化' } } }
        });
    }

    function calculateScore() {
        const total = (workouts.length * 10) + (bodyStats.length * 15);
        const res = document.getElementById('score-result');
        let rank = "💤 尚未出發", color = "#9e9e9e";
        if(total > 150) { rank = "👑 終極健康大師"; color = "#e51400"; }
        else if(total > 80) { rank = "🥇 鋼鐵自律者"; color = "#FFD700"; }
        else if(total > 30) { rank = "🥈 活力運動員"; color = "#C0C0C0"; }
        else if(total > 0) { rank = "🥉 健康實踐家"; color = "#cd7f32"; }

        res.style.display = "block"; res.style.backgroundColor = color; res.style.color = "white";
        res.innerHTML = `獲得分數：${total} 分 <br> 目前稱號：${rank}`;
    }

    function clearData() {
        if(confirm("確定要清除所有紀錄嗎？")) {
            localStorage.removeItem('f3_v6_workouts');
            localStorage.removeItem('f3_v6_bodyStats');
            localStorage.removeItem('f3_v6_goals');
            workouts = []; bodyStats = []; goals = {};
            renderTables(); updateCharts(); updateGoalSummary();
            document.getElementById('score-result').style.display = 'none';
        }
    }

    // 聊天機械人
    const botResponses = {
        "減肥": "減肥的核心是「熱量赤字」，即消耗的熱量大於攝入的熱量。建議控制飲食（少吃零食甜飲），並搭配每週3次以上的有氧運動！",
        "有氧": "有氧運動如慢跑、跳繩、游泳能有效燃燒脂肪🔥。每次建議持續 30 分鐘以上效果最好喔！",
        "增肌": "增肌需要「阻力訓練（如舉重、掌上壓）」破壞肌肉纖維，再配合充足的「蛋白質」和「休息」讓它生長得更強壯💪。",
        "掌上壓": "掌上壓能訓練胸肌。記得收緊核心，身體保持一條直線，下降時吸氣，推起時呼氣。",
        "飲食": "不論是增肌還是減脂，多吃原型食物（如雞胸肉、雞蛋、蔬菜、番薯），少吃加工食品都是黃金法則！"
    };

    function toggleChat() {
        const widget = document.getElementById('chat-widget');
        widget.style.display = widget.style.display === 'flex' ? 'none' : 'flex';
    }
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        addChatMessage(text, 'user-message');
        input.value = '';

        let response = "這個問題超出了我的資料庫。你可以試著問我「減肥」、「有氧」、「增肌」或「飲食」的相關建議！";
        for (const key in botResponses) {
            if (text.includes(key)) { response = botResponses[key]; break; }
        }
        setTimeout(() => addChatMessage(response, 'bot-message'), 400);
    }
    function addChatMessage(text, className) {
        const msgs = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight; 
    }
</script>

</body>
</html>
